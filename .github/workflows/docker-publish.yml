name: CI/CD Pipeline

on:
  schedule:
    - cron: '18 5 * * *'
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Run Test Suite (CI)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Exclude asyncpg for testing inside CI to avoid compilation issues
          grep -v "asyncpg" backend/requirements.txt > temp_reqs.txt
          python -m pip install -r temp_reqs.txt
          python -m pip install ruff bandit pytest httpx anyio

      - name: Lint with Ruff
        run: |
          ruff check backend/app backend/dataset_pipeline backend/feature_engineering \
            backend/training backend/evaluation backend/inference || echo "Ruff warning"

      - name: Security Scan with Bandit
        run: |
          bandit -r backend/app backend/dataset_pipeline backend/feature_engineering \
            backend/training backend/evaluation backend/inference -ll || echo "Bandit warnings found"

      - name: Run Unit Tests with Pytest
        env:
          PYTHONPATH: backend
        run: pytest backend/tests/ -v

      - name: Dataset Collection
        timeout-minutes: 3
        env:
          PYTHONPATH: backend
          CI: true
        run: |
          python backend/dataset_pipeline/collector.py

      - name: Telemetry Dataset Builder
        timeout-minutes: 2
        env:
          PYTHONPATH: backend
          CI: true
        run: |
          python backend/dataset_pipeline/telemetry_dataset_builder.py

      - name: Feature Engineering
        timeout-minutes: 2
        env:
          PYTHONPATH: backend
          CI: true
        run: |
          python backend/feature_engineering/extractor.py

      - name: Model Training
        timeout-minutes: 3
        env:
          PYTHONPATH: backend
          CI: true
        run: |
          python backend/training/trainer.py

      - name: Model Evaluation
        timeout-minutes: 2
        env:
          PYTHONPATH: backend
          CI: true
        run: |
          python backend/evaluation/evaluator.py

      - name: Install SHAP (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: python -m pip install "shap>=0.42.0"

      - name: SHAP Explainability
        if: github.event_name == 'workflow_dispatch'
        timeout-minutes: 5
        env:
          PYTHONPATH: backend
          CI: true
        run: |
          python backend/evaluation/shap_analysis.py


  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 # v3.5.0
        with:
          cosign-release: 'v2.2.4'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934 # v5.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: backend
          file: backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner (Repo Scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'


      - name: Sign the published Docker image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

  deploy:
    name: Deploy to Hugging Face Spaces (CD)
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Hugging Face CLI
        run: pip install -U "huggingface_hub[cli,hf_xet]"

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_SPACE_NAME" ]; then
            echo "WARNING: HF_TOKEN or HF_SPACE_NAME secret is not set. Skipping Hugging Face CD deployment."
            exit 0
          fi

          # Upload backend/ to HF Space root, deleting any remote files not present locally.
          # huggingface-cli handles Xet binary storage (pkl, png, etc.) transparently.
          huggingface-cli upload "$HF_SPACE_NAME" backend/ . \
            --repo-type=space \
            --token="$HF_TOKEN" \
            --delete="*" \
            --commit-message="Deploy from GitHub Actions (Commit: ${{ github.sha }})"

          echo "Successfully deployed to Hugging Face Space: $HF_SPACE_NAME"
